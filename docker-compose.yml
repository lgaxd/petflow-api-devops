services:
  h2db:
    image: oscarfonts/h2
    container_name: h2db
    ports:
      - "81:81"
      - "1521:1521"
    volumes:
      - h2-data:/opt/h2-data
    command: -ifNotExists
    networks:
      - petflow-network

  petflow-api:
    build: .
    container_name: petflow-api
    ports:
      - "8080:8080"
    depends_on:
      - h2db
    networks:
      - petflow-network

networks:
  petflow-network:

volumes:
  h2-data:
