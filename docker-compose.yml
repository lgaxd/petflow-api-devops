services:

  h2db:
    image: oscarfonts/h2
    container_name: h2db

    ports:
      - "9090:9090"
      - "81:81"

    volumes:
      - h2-data:/opt/h2-data

    environment:
      H2_OPTIONS: "-ifNotExists"

    networks:
      - petflow-network

  petflow-api:
    build: .
    container_name: petflow-api

    ports:
      - "8080:8080"

    depends_on:
      - h2db

    networks:
      - petflow-network

networks:
  petflow-network:

volumes:
  h2-data: